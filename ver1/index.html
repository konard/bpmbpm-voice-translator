<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Голосовой переводчик</title>
  <style>
    /* ---- Основные стили ---- */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #2d3748;
      margin-bottom: 8px;
      text-align: center;
    }

    /* ---- Строка статуса ---- */
    .status {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      background: #e2e8f0;
      color: #4a5568;
      font-size: 0.9rem;
      margin-bottom: 20px;
      transition: background 0.2s;
    }

    .status--error {
      background: #fed7d7;
      color: #c53030;
    }

    /* ---- Кнопки управления ---- */
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .btn {
      padding: 12px 32px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn--start {
      background: #48bb78;
      color: #fff;
    }
    .btn--start:not(:disabled):hover { background: #38a169; }

    .btn--stop {
      background: #fc8181;
      color: #fff;
    }
    .btn--stop:not(:disabled):hover { background: #e53e3e; }

    /* ---- Панели текста ---- */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      max-width: 900px;
      margin-bottom: 20px;
    }

    @media (max-width: 600px) {
      .panels { grid-template-columns: 1fr; }
    }

    .panel {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      min-height: 140px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .panel__label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #718096;
      margin-bottom: 10px;
    }

    .panel__text {
      font-size: 1.05rem;
      line-height: 1.6;
      color: #2d3748;
      min-height: 60px;
    }

    .panel__transcription {
      font-size: 0.85rem;
      color: #a0aec0;
      margin-top: 8px;
      font-style: italic;
    }

    /* ---- Блок настроек ---- */
    .settings {
      width: 100%;
      max-width: 900px;
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .settings__title {
      font-size: 1rem;
      font-weight: 700;
      color: #2d3748;
      margin-bottom: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .settings__title::before {
      content: "⚙️";
    }

    .settings__grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 600px) {
      .settings__grid { grid-template-columns: 1fr; }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 0.82rem;
      font-weight: 600;
      color: #718096;
    }

    .field select,
    .field input[type="range"] {
      width: 100%;
    }

    .field select {
      padding: 8px 10px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      background: #f7fafc;
      font-size: 0.95rem;
      color: #2d3748;
    }

    .range-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .range-row input { flex: 1; }

    .range-value {
      min-width: 60px;
      font-size: 0.9rem;
      color: #4a5568;
      text-align: right;
    }

    .btn--apply {
      margin-top: 16px;
      background: #667eea;
      color: #fff;
      padding: 10px 24px;
    }
    .btn--apply:hover { background: #5a67d8; }

    /* ---- Подсказка ---- */
    .hint {
      font-size: 0.78rem;
      color: #a0aec0;
      margin-top: 16px;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>🎤 Голосовой переводчик</h1>
  <span class="status" id="status">Нажмите «Старт» для начала</span>

  <!-- Кнопки управления -->
  <div class="controls">
    <button class="btn btn--start" id="startBtn">▶ Старт</button>
    <button class="btn btn--stop"  id="stopBtn" disabled>■ Стоп</button>
  </div>

  <!-- Панели с текстом -->
  <div class="panels">
    <!-- Исходный текст -->
    <div class="panel">
      <div class="panel__label" id="sourceLang">Исходный текст</div>
      <div class="panel__text" id="sourceText">— Говорите в микрофон...</div>
    </div>

    <!-- Перевод -->
    <div class="panel">
      <div class="panel__label" id="targetLang">Перевод</div>
      <div class="panel__text" id="targetText">— Перевод появится здесь...</div>
      <div class="panel__transcription" id="transcription"></div>
    </div>
  </div>

  <!-- Блок настроек -->
  <div class="settings" id="configPanel">
    <div class="settings__title">Настройки</div>
    <div class="settings__grid">

      <!-- Направление перевода -->
      <div class="field">
        <label for="dirSelect">Направление перевода</label>
        <select id="dirSelect">
          <option value="ru-en">Русский → Английский</option>
          <option value="en-ru">Английский → Русский</option>
        </select>
      </div>

      <!-- Пол голоса -->
      <div class="field">
        <label for="genderSelect">Голос озвучки</label>
        <select id="genderSelect">
          <option value="female">Женский</option>
          <option value="male">Мужской</option>
        </select>
      </div>

      <!-- Скорость -->
      <div class="field">
        <label for="rateInput">Скорость произношения</label>
        <div class="range-row">
          <input type="range" id="rateInput" min="0.5" max="2.0" step="0.1" value="1.0">
          <span class="range-value" id="rateValue">1.0</span>
        </div>
      </div>

      <!-- Пауза -->
      <div class="field">
        <label for="pauseInput">Пауза для конца блока</label>
        <div class="range-row">
          <input type="range" id="pauseInput" min="500" max="4000" step="100" value="1500">
          <span class="range-value" id="pauseValue">1500 мс</span>
        </div>
      </div>

    </div>
    <button class="btn btn--apply" id="applyConfig">Применить настройки</button>
  </div>

  <p class="hint">Работает в Chrome и Edge. Требует разрешение на микрофон.</p>

  <!-- Подключение основного модуля -->
  <script src="translator.js"></script>
</body>
</html>
