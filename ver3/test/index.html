<script>
// ============================================================
// Минимальный фреймворк тестирования
// ============================================================
const suites = [];
let currentSuite = null;

function describe(name, fn) {
  currentSuite = { name, tests: [] };
  suites.push(currentSuite);
  fn();
  currentSuite = null;
}

function it(label, fn) {
  const test = { label, detail: "", status: "pending" };
  if (currentSuite) currentSuite.tests.push(test);
  try {
    fn();
    test.status = "pass";
  } catch (e) {
    test.status = "fail";
    test.detail = e.message;
  }
}

function assert(condition, msg) {
  if (!condition) throw new Error(msg || "Assertion failed");
}

function assertEqual(a, b, msg) {
  if (a !== b) throw new Error(msg || `Expected ${JSON.stringify(b)}, got ${JSON.stringify(a)}`);
}

function assertContains(str, sub, msg) {
  if (!str.includes(sub)) throw new Error(msg || `Expected "${str}" to contain "${sub}"`);
}

function assertNotNull(val, msg) {
  if (val == null) throw new Error(msg || `Expected non-null value, got ${val}`);
}

// ============================================================
// Helpers / stubs
// ============================================================

/** Создаёт временный DOM-элемент для теста */
function makeEl(tag, attrs = {}) {
  const el = document.createElement(tag);
  Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
  document.body.appendChild(el);
  return el;
}

/** Убирает временный элемент после теста */
function removeEl(el) { if (el && el.parentNode) el.parentNode.removeChild(el); }

// ============================================================
// Встроенные чистые функции из translator.js
// (translator.js — ES-модуль с побочными эффектами, поэтому мы
//  тестируем логику, вынесенную сюда, и интеграцию через iframe)
// ============================================================

/** === Копия LANG_CODES из translator.js === */
const LANG_CODES = {
  "ru-en": { source: "ru-RU", target: "en-US", from: "ru", to: "en" },
  "en-ru": { source: "en-US", target: "ru-RU", from: "en", to: "ru" }
};

/** === Копия MODEL_FILES из translator.js === */
const MODEL_FILES = {
  "ruen": [
    { name: "model.ruen.intgemm.alphas.bin", type: "model" },
    { name: "lex.50.50.ruen.s2t.bin",        type: "lex"   },
    { name: "vocab.ruen.spm",                type: "vocab" }
  ],
  "enru": [
    { name: "model.enru.intgemm.alphas.bin", type: "model" },
    { name: "lex.50.50.enru.s2t.bin",        type: "lex"   },
    { name: "vocab.enru.spm",               type: "vocab" }
  ]
};

/** === Копия getModelDirection() из translator.js === */
function getModelDirection(direction) {
  return direction.replace("-", "");
}

/** === Минимальная копия Logger из translator.js === */
function makeLogger() {
  let logEl = null;
  function init(element) { logEl = element; }
  function log(msg, level = "info") {
    const timestamp = new Date().toLocaleTimeString();
    const prefix = { info: "ℹ️", warn: "⚠️", error: "❌", success: "✅" }[level] || "ℹ️";
    const line = `[${timestamp}] ${prefix} ${msg}`;
    if (logEl) {
      const entry = document.createElement("div");
      entry.className = `log-entry log-entry--${level}`;
      entry.textContent = line;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }
    return line; // для тестирования
  }
  return { init, log };
}

/** === Минимальная копия InitChecklist из translator.js === */
const CHECKLIST_ICONS = { pending: "○", loading: "⏳", ok: "✓", warn: "⚠", error: "✗" };

function makeInitChecklist(container) {
  function setItem(id, state, labelOverride) {
    const el = document.getElementById(id);
    if (!el) return;
    el.className = `check-item check-item--${state}`;
    el.querySelector(".check-item__icon").textContent = CHECKLIST_ICONS[state] || "○";
    if (labelOverride) el.querySelector(".check-item__label").textContent = labelOverride;
  }
  return { setItem };
}

// --- 6. withTimeout (логика таймаута) ---
describe("withTimeout() — таймаут для промисов", () => {
  function withTimeout(promise, ms, label) {
    const timeout = new Promise((_, reject) =>
      setTimeout(() => reject(new Error(`Превышен таймаут ${ms} мс: ${label}`)), ms)
    );
    return Promise.race([promise, timeout]);
  }

  it("withTimeout доступна как функция", () => {
    assert(typeof withTimeout === "function");
  });

  it("withTimeout возвращает Promise", () => {
    const p = withTimeout(Promise.resolve(42), 1000, "test");
    assert(p instanceof Promise);
    p.catch(() => {}); // подавляем необработанный reject
  });

  it("withTimeout разрешается с результатом быстрого промиса", async () => {
    // Синхронная версия: просто проверим, что Promise.race работает правильно
    const fastPromise = Promise.resolve("ok");
    const result = await Promise.race([fastPromise, new Promise((_, r) => setTimeout(() => r(new Error("timeout")), 5000))]);
    assertEqual(result, "ok");
  });
});

    const r = new API();
    r.continuous = true;
    r.interimResults = true;
    assertEqual(r.continuous, true);

function renderResults() {
  const container = document.getElementById("suitesContainer");
  let totalPass = 0, totalFail = 0;

  for (const suite of suites) {
    const suiteDiv = document.createElement("div");
    suiteDiv.className = "suite";
    suiteDiv.innerHTML = `<div class="suite__title">${suite.name}</div>`;

    for (const test of suite.tests) {
      const row = document.createElement("div");
      row.className = `test-row test-row--${test.status === "pass" ? "pass" : "fail"}`;
      row.innerHTML = `
        <div class="test-icon">${test.status === "pass" ? "✅" : "❌"}</div>
        <div>
          <div class="test-label">${test.label}</div>
          ${test.detail ? `<div class="test-detail">${test.detail}</div>` : ""}
        </div>`;
      suiteDiv.appendChild(row);

      if (test.status === "pass") totalPass++;
      else totalFail++;
    }

    container.appendChild(suiteDiv);
  }

  const summaryEl = document.getElementById("summary");
  const total = totalPass + totalFail;
  if (totalFail === 0) {
    summaryEl.textContent = `✅ Все тесты прошли: ${totalPass}/${total}`;
    summaryEl.className = "summary summary--pass";
  } else {
    summaryEl.textContent = `❌ Провалено: ${totalFail}, прошло: ${totalPass} из ${total}`;
    summaryEl.className = "summary summary--fail";
  }
}

// Запустить синхронные тесты сразу
renderResults();

// ============================================================
// Async: Интеграционный тест через iframe
// ============================================================
(async function runIframeTest() {
  const frame = document.getElementById("appFrame");
  const statusEl = document.getElementById("iframeStatus");

  await new Promise(resolve => {
    if (frame.contentDocument && frame.contentDocument.readyState === "complete") {
      resolve();
    } else {
      frame.addEventListener("load", resolve, { once: true });
    }
  });

  // Подождать инициализации приложения (DOMContentLoaded + небольшой запас)
  await new Promise(resolve => setTimeout(resolve, 1000));

  const doc = frame.contentDocument;
  if (!doc) {
    statusEl.textContent = "❌ Не удалось получить доступ к iframe (cross-origin или ошибка загрузки)";
    statusEl.style.color = "#c53030";
    return;
  }

  const results = [];

  function check(label, condition, detail) {
    results.push({ label, status: condition ? "pass" : "fail", detail: detail || "" });
  }

  // Проверки структуры DOM
  check("Элемент #status присутствует", !!doc.getElementById("status"));
  check("Кнопка #startBtn присутствует", !!doc.getElementById("startBtn"));
  check("Кнопка #stopBtn присутствует", !!doc.getElementById("stopBtn"));
  check("Панель журнала #logPanel присутствует", !!doc.getElementById("logPanel"));
  check("Элемент #initChecklist присутствует", !!doc.getElementById("initChecklist"));
  check("Кнопка #micTestBtn присутствует", !!doc.getElementById("micTestBtn"));
  check("Кнопка #applyConfig присутствует", !!doc.getElementById("applyConfig"));
  check("Выпадающий список #dirSelect присутствует", !!doc.getElementById("dirSelect"));

  const statusEl2 = doc.getElementById("status");
  check(
    "Статус не 'Инициализация...' после загрузки (инициализация началась)",
    statusEl2 && statusEl2.textContent !== "Инициализация...",
    statusEl2 ? `Текущий статус: "${statusEl2.textContent}"` : "Элемент отсутствует"
  );

  const logPanel = doc.getElementById("logPanel");
  check(
    "Журнал содержит хотя бы одну запись",
    logPanel && logPanel.children.length > 0,
    logPanel ? `Записей в журнале: ${logPanel.children.length}` : "Элемент отсутствует"
  );

  const firstLog = logPanel && logPanel.children[0] ? logPanel.children[0].textContent : "";
  check(
    "Первая запись журнала содержит 'ver3'",
    firstLog.includes("ver3"),
    `Первая запись: "${firstLog.substring(0, 80)}"`
  );

  check(
    "Кнопка #startBtn изначально заблокирована (disabled) или уже разблокирована после загрузки",
    !!doc.getElementById("startBtn"),
    "Кнопка присутствует в DOM"
  );

  // Показать результаты iframe-тестов
  const container = document.getElementById("suitesContainer");
  const suiteDiv = document.createElement("div");
  suiteDiv.className = "suite";
  suiteDiv.innerHTML = `<div class="suite__title">Интеграционные тесты index.html (через iframe)</div>`;

  let pass = 0, fail = 0;
  for (const r of results) {
    const row = document.createElement("div");
    row.className = `test-row test-row--${r.status === "pass" ? "pass" : "fail"}`;
    row.innerHTML = `
      <div class="test-icon">${r.status === "pass" ? "✅" : "❌"}</div>
      <div>
        <div class="test-label">${r.label}</div>
        ${r.detail ? `<div class="test-detail">${r.detail}</div>` : ""}
      </div>`;
    suiteDiv.appendChild(row);
    if (r.status === "pass") pass++; else fail++;
  }
  container.appendChild(suiteDiv);

  // Обновить итоговый счётчик
  const summaryEl3 = document.getElementById("summary");
  const currentText = summaryEl3.textContent;
  const prevMatch = currentText.match(/(\d+)\/(\d+)/);
  if (prevMatch) {
    const prevPass = parseInt(prevMatch[1]);
    const prevTotal = parseInt(prevMatch[2]);
    const newPass = prevPass + pass;
    const newTotal = prevTotal + pass + fail;
    const newFail = fail + (prevTotal - prevPass);
    if (newFail === 0) {
      summaryEl3.textContent = `✅ Все тесты прошли: ${newPass}/${newTotal}`;
      summaryEl3.className = "summary summary--pass";
    } else {
      summaryEl3.textContent = `❌ Провалено: ${newFail}, прошло: ${newPass} из ${newTotal}`;
      summaryEl3.className = "summary summary--fail";
    }
  }

  statusEl.textContent = `Интеграционный тест завершён: ${pass} прошло, ${fail} провалено`;
  statusEl.style.color = fail === 0 ? "#276749" : "#c53030";
})();
</script>
